general {
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = pidof hyprlock && hyprctl dispatch dpms off
}

listener {
    timeout = 1800
    on-timeout = pidof hyprlock || hyprlock --grace 5
}

listener {
    timeout = 2100
    on-timeout = pidof hyprlock && hyprctl dispatch dpms off
}
